# Eval gate generated by agent-eval-scaffold. Copy to .github/workflows/evals.yml
name: evals

on:
  pull_request:
  push:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run evals
        env:
          EVAL_SEED: "0"
          PYTHONHASHSEED: "0"
        run: pytest evals/
